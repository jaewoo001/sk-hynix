name: Update SK Hynix dashboard
on:
  schedule:
    - cron: "30 22 * * 0-4"   # 07:30 KST Mon-Fri (before the KRX open)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python cloud_update.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dashboard.html data/
          git commit -m "Auto-update dashboard [skip ci]" || echo "no changes to commit"
          git push
